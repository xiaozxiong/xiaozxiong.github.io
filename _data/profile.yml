# ── About ────────────────────────────────────────────────
# about_lead: >-
#   I explore how to harness <strong>GPU hardware</strong> — specifically
#   <strong>RT cores</strong> originally built for ray tracing —
#   to accelerate non-graphics, general-purpose computations such as
#   graph algorithms and vector search.

about_detail: >-
  I am an incoming Ph.D. student in the
  <a href="https://cse.osu.edu/">Department of Computer Science and Engineering</a>
  at <a href="https://www.osu.edu/">The Ohio State University</a>,
  advised by Prof. <a href="https://xiaodongzhang1911.github.io">Xiaodong Zhang</a>.
  My research sits at the intersection of <strong>computer systems</strong>,
  <strong>GPU architecture</strong>, and <strong>high-performance computing</strong>,
  with a focus on repurposing <strong>ray tracing (RT) cores</strong>, massively hardware-accelerated
  parallel spatial-query engines originally built for graphics, to accelerate broader computational workloads.
  I received my M.Eng. from <a href="https://www.cs.sdu.edu.cn/">Shandong University</a>,
  advised by Prof. <a href="https://xiaomengbai.github.io/">Mengbai Xiao</a>,
  and B.Eng. from <a href="https://www.dlmu.edu.cn/">Dalian Maritime University</a>.

